<html lang="fr">
<head>

  <style>
    :root{
      --bg:#02050a;
      --ink:#fff7df;
      --muted:rgba(255,247,223,.72);
      --soft:rgba(255,247,223,.48);
      --gold:#f6c75e;
      --gold2:#ffe9a6;
      --gold3:#b77b1b;
      --panel:#050913;
      --panel2:#08101d;
      --line:rgba(246,199,94,.34);
      --line2:rgba(246,199,94,.18);
      --shadow:0 24px 80px rgba(0,0,0,.60);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select{font:inherit;color:inherit} button{border:0;background:none;cursor:pointer} button:active{transform:scale(.985)}
    .app{height:100dvh;width:100vw;display:grid;place-items:center;background:radial-gradient(circle at 50% 8%,rgba(35,75,95,.22),transparent 34%),#000;overflow:hidden}
    .phone{position:relative;height:100dvh;width:100vw;max-width:480px;aspect-ratio:9/16;background:var(--bg);overflow:hidden;box-shadow:0 0 0 1px rgba(246,199,94,.14),0 30px 100px #000}
    @media (min-width:560px){.phone{height:100dvh;width:auto;border-radius:28px}}
    .screen{position:absolute;inset:0;display:none;overflow:hidden;background:#02050a}.screen.active{display:block}
    .stars,.stars:before,.stars:after{position:absolute;inset:-20%;content:"";pointer-events:none;background-image:radial-gradient(circle,rgba(255,232,164,.82) 0 1px,transparent 1.4px),radial-gradient(circle,rgba(120,210,255,.5) 0 .8px,transparent 1.1px);background-size:56px 72px,92px 106px;background-position:0 0,24px 18px;opacity:.46}.stars:before{transform:rotate(15deg) scale(1.1);opacity:.24}.stars:after{transform:rotate(-20deg) scale(1.25);opacity:.16}
    .topline{position:absolute;left:14px;right:14px;top:14px;height:46px;z-index:8;display:grid;grid-template-columns:46px 1fr 46px;align-items:center}.round{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);background:rgba(2,5,10,.38);color:var(--gold);box-shadow:inset 0 0 18px rgba(246,199,94,.08);font-size:24px}.brand{text-align:center;font-family:Georgia,"Times New Roman",serif;color:var(--gold2);letter-spacing:.18em;text-transform:uppercase;line-height:1.05;text-shadow:0 0 16px rgba(246,199,94,.30)}.brand small{display:block;font-size:9px;letter-spacing:.42em}.brand b{font-size:21px;font-weight:700}
    .portal{background:radial-gradient(circle at 50% 46%,rgba(246,199,94,.12),transparent 35%),linear-gradient(#02050a,#000)}
    .portal .frame{position:absolute;inset:12px;border:1px solid rgba(246,199,94,.28);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.008));overflow:hidden;box-shadow:inset 0 0 80px rgba(0,0,0,.46)}
    .portal-art{position:absolute;inset:0;background:radial-gradient(circle at 50% 38%,rgba(255,205,82,.32),rgba(255,205,82,.08) 20%,transparent 42%),radial-gradient(circle at 17% 34%,rgba(47,151,214,.16),transparent 20%),radial-gradient(circle at 84% 28%,rgba(246,199,94,.11),transparent 14%)}
    .portal-title{position:absolute;top:64px;left:18px;right:18px;text-align:center;font-family:Georgia,"Times New Roman",serif;z-index:3}.portal-title .tiny{font-size:12px;letter-spacing:.46em;color:var(--gold2);text-transform:uppercase}.portal-title h1{margin:2px 0 6px;font-size:clamp(39px,11vw,63px);line-height:.92;color:var(--gold);text-transform:uppercase;text-shadow:0 0 24px rgba(246,199,94,.28)}.portal-title p{margin:0;font-size:clamp(17px,4.6vw,24px);color:var(--ink)}
    .cosmos{position:absolute;left:50%;top:49%;width:min(88vw,410px);aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;z-index:2}.halo{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(246,199,94,.62);box-shadow:0 0 40px rgba(246,199,94,.22),inset 0 0 34px rgba(246,199,94,.12)}.halo:before{content:"";position:absolute;inset:-13%;border-radius:50%;background:conic-gradient(from 210deg,transparent 0 18deg,rgba(255,229,143,.88) 26deg,rgba(246,199,94,.35) 54deg,transparent 76deg 360deg);filter:blur(.2px);animation:turn 16s linear infinite}.halo:after{content:"";position:absolute;inset:14%;border-radius:50%;border:1px dashed rgba(246,199,94,.28);box-shadow:0 0 0 28px rgba(246,199,94,.03),0 0 0 56px rgba(246,199,94,.028),0 0 0 84px rgba(246,199,94,.022)}
    .zodiac-ring{position:absolute;inset:6%;border-radius:50%;animation:turn 72s linear infinite}.zmini{position:absolute;left:50%;top:50%;width:34px;height:34px;margin:-17px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 35% 28%,#fff6ba,#f0b52d 46%,#7c4c08);color:#0b0600;font-family:Georgia,"Times New Roman",serif;font-size:18px;font-weight:800;border:1px solid rgba(255,255,255,.45);box-shadow:0 0 18px rgba(246,199,94,.45)}.zmini span{transform:translateY(-1px)}
    .seal{position:absolute;left:50%;top:50%;width:128px;height:128px;transform:translate(-50%,-50%);border-radius:50%;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 50% 42%,rgba(255,226,119,.30),rgba(7,12,20,.96) 56%,#010307);border:1px solid rgba(246,199,94,.56);box-shadow:0 0 42px rgba(246,199,94,.38),inset 0 0 30px rgba(246,199,94,.14);z-index:4}.seal-logo{font-size:50px;color:var(--gold2);line-height:1;text-shadow:0 0 22px rgba(246,199,94,.92)}.seal-name{font-family:Georgia,"Times New Roman",serif;font-size:15px;letter-spacing:.34em;color:var(--gold2);text-transform:uppercase;margin-top:-2px}.seal-range{font-size:10px;letter-spacing:.14em;color:rgba(255,247,223,.72);text-transform:uppercase}
    .portal-btn{position:absolute;left:8%;right:8%;bottom:170px;z-index:6;height:66px;border-radius:999px;background:linear-gradient(180deg,#fff0a9 0,#f6c75e 46%,#d89823 100%);color:#130b02;font-family:Georgia,"Times New Roman",serif;font-weight:900;font-size:clamp(27px,7vw,38px);box-shadow:0 12px 30px rgba(246,199,94,.25),inset 0 2px 0 rgba(255,255,255,.58),inset 0 -5px 0 rgba(87,47,0,.20)}.known{position:absolute;left:8%;right:8%;bottom:126px;z-index:6;color:var(--gold);font-family:Georgia,"Times New Roman",serif;font-size:23px;text-align:center}.portal-icons{position:absolute;left:6%;right:6%;bottom:28px;z-index:6;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.picon{height:74px;border:1px solid rgba(246,199,94,.28);border-radius:14px;background:rgba(2,5,10,.46);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--gold2);font-size:11px;text-align:center}.picon b{font-family:Georgia,"Times New Roman",serif;font-size:24px;color:var(--gold)}
    .dash,.module-screen,.daily-screen{padding:calc(14px + env(safe-area-inset-top,0px)) 16px calc(80px + var(--safe-bottom));overflow:hidden;background:radial-gradient(circle at 50% 32%,rgba(246,199,94,.10),transparent 28%),#02050a}.dash:before,.module-screen:before,.daily-screen:before{content:"";position:absolute;inset:10px;border:1px solid rgba(246,199,94,.20);border-radius:30px;pointer-events:none}.dash .hero{position:relative;z-index:2;text-align:center;margin-top:52px}.dash .hero h2{font-family:Georgia,"Times New Roman",serif;color:var(--gold);font-size:clamp(52px,13.2vw,70px);line-height:.9;margin:0;text-shadow:0 0 22px rgba(246,199,94,.22)}.dash .hero p{font-family:Georgia,"Times New Roman",serif;color:var(--ink);font-size:clamp(28px,7.2vw,40px);margin:0}
    .astro-board{position:relative;height:min(48dvh,450px);min-height:360px;margin-top:10px;z-index:2}.orbit{position:absolute;left:50%;top:49%;width:min(83vw,392px);aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(246,199,94,.46);box-shadow:inset 0 0 40px rgba(246,199,94,.07),0 0 34px rgba(246,199,94,.13)}.orbit:before{content:"";position:absolute;inset:-8%;border-radius:50%;background:conic-gradient(from 220deg,transparent 0 20deg,rgba(255,229,143,.74) 24deg,rgba(246,199,94,.22) 58deg,transparent 85deg 360deg);animation:turn 15s linear infinite}.orbit:after{content:"";position:absolute;inset:12%;border-radius:50%;box-shadow:0 0 0 26px rgba(246,199,94,.055),0 0 0 54px rgba(246,199,94,.038),0 0 0 84px rgba(246,199,94,.025)}.center-sign{position:absolute;left:50%;top:50%;width:136px;height:136px;transform:translate(-50%,-50%);border-radius:50%;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 36% 28%,rgba(255,242,170,.32),rgba(9,13,18,.98) 58%,#010308);border:1px solid rgba(246,199,94,.55);box-shadow:0 0 45px rgba(246,199,94,.32),inset 0 0 30px rgba(246,199,94,.10);z-index:3}.center-sign .glyph{font-family:Georgia,"Times New Roman",serif;font-size:56px;line-height:1;color:var(--gold2);text-shadow:0 0 18px rgba(246,199,94,.72)}.center-sign .name{font-family:Georgia,"Times New Roman",serif;letter-spacing:.33em;font-size:16px;color:var(--gold2);text-transform:uppercase}.center-sign .range{font-size:11px;letter-spacing:.11em;color:var(--muted);text-transform:uppercase}.mod{position:absolute;z-index:4;display:grid;place-items:center;text-align:center}.mod .circle{width:72px;height:72px;border-radius:50%;border:1px solid rgba(246,199,94,.30);background:radial-gradient(circle,rgba(246,199,94,.12),rgba(5,9,18,.78));display:grid;place-items:center;color:var(--gold2);font-size:32px}.mod .label{margin-top:-8px;padding:7px 12px;border:1px solid rgba(246,199,94,.36);border-radius:10px;background:rgba(2,5,10,.84);font-family:Georgia,"Times New Roman",serif;font-size:19px;color:var(--gold2);line-height:1}.mod-h{left:50%;top:1%;transform:translateX(-50%)}.mod-c{left:1%;top:33%}.mod-t{right:1%;top:33%}.mod-n{left:6%;bottom:0}.mod-cr{right:6%;bottom:0}
    .energy{position:relative;z-index:3;border:1px solid rgba(246,199,94,.34);border-radius:22px;background:linear-gradient(180deg,rgba(8,16,29,.94),rgba(3,6,12,.9));padding:16px 18px 15px;box-shadow:var(--shadow);margin-top:4px}.energy h3{font-family:Georgia,"Times New Roman",serif;color:var(--gold2);font-size:clamp(29px,7.4vw,42px);margin:0 0 12px;text-align:center}.meter{display:grid;grid-template-columns:34px 82px 1fr 44px;gap:9px;align-items:center;margin:9px 0}.meter .dot{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(246,199,94,.24);color:var(--gold);font-size:17px}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#c9881a,#ffe9a6,#d89924)}.cta{position:relative;z-index:5;margin:12px auto 0;width:100%;height:64px;border-radius:999px;background:linear-gradient(180deg,#fff0a9,#f6c75e 45%,#d89823);font-family:Georgia,"Times New Roman",serif;font-size:clamp(26px,6.5vw,35px);font-weight:900;color:#130b02;box-shadow:inset 0 2px 0 rgba(255,255,255,.55),0 10px 30px rgba(246,199,94,.20)}
    nav{position:absolute;left:0;right:0;bottom:0;height:calc(64px + var(--safe-bottom));z-index:20;background:linear-gradient(180deg,rgba(1,4,9,.74),rgba(1,4,9,.98));border-top:1px solid rgba(246,199,94,.14);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:var(--safe-bottom);backdrop-filter:blur(14px)}nav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:rgba(255,247,223,.58);font-size:11px}nav b{font-size:22px;color:inherit;font-weight:400}nav button.active{color:var(--gold2)}
    .daily-screen,.module-screen{overflow:auto}.page-head{position:relative;z-index:2;text-align:center;margin-top:52px}.page-head h2{font-family:Georgia,"Times New Roman",serif;color:var(--gold);font-size:clamp(44px,11.5vw,62px);line-height:.95;margin:0}.page-head p{font-family:Georgia,"Times New Roman",serif;color:var(--ink);font-size:clamp(20px,5.5vw,30px);margin:6px 0 0}.card{position:relative;z-index:2;margin:28px 4px 16px;padding:26px 18px;border:1px solid rgba(246,199,94,.32);border-radius:24px;background:linear-gradient(180deg,rgba(8,16,29,.96),rgba(4,8,15,.92));box-shadow:var(--shadow);text-align:center}.big-seal{width:72px;height:72px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;background:radial-gradient(circle at 35% 25%,#fff0a9,#d99b27 52%,#281500);color:#090400;font-family:Georgia,"Times New Roman",serif;font-size:38px;font-weight:900;box-shadow:0 0 24px rgba(246,199,94,.42)}.date{font-size:15px;color:var(--muted);margin:4px 0 14px}.daily-text{font-family:Georgia,"Times New Roman",serif;font-size:clamp(27px,7vw,39px);line-height:1.12;color:var(--gold2);margin:0 0 18px}.daily-sub{font-size:18px;line-height:1.45;color:var(--muted);margin:0}.score-grid{position:relative;z-index:3;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 4px 16px}.score{border:1px solid rgba(246,199,94,.26);border-radius:18px;background:rgba(2,5,10,.62);padding:13px 4px;text-align:center}.score b{display:block;color:var(--gold);font-size:24px;margin-top:2px}.affinity{position:relative;z-index:2;border:1px solid rgba(246,199,94,.25);border-radius:18px;background:rgba(2,5,10,.58);padding:15px;text-align:center;font-family:Georgia,"Times New Roman",serif;color:var(--gold2);font-size:22px}.backbtn{position:relative;z-index:2;width:100%;height:58px;border-radius:999px;margin:16px 0 20px;background:linear-gradient(180deg,#fff0a9,#f6c75e 48%,#d89823);color:#140b02;font-family:Georgia,"Times New Roman",serif;font-weight:900;font-size:25px}
    .detail{position:relative;z-index:2;margin:20px 4px;border:1px solid rgba(246,199,94,.30);border-radius:24px;background:linear-gradient(180deg,rgba(8,16,29,.96),rgba(3,6,12,.93));box-shadow:var(--shadow);padding:22px 18px}.detail h3{font-family:Georgia,"Times New Roman",serif;color:var(--gold);font-size:34px;margin:0 0 8px}.detail p{color:var(--muted);line-height:1.45;margin:0 0 14px;font-size:17px}.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.mini-card{border:1px solid rgba(246,199,94,.20);border-radius:17px;background:rgba(2,5,10,.56);padding:14px}.mini-card strong{display:block;color:var(--gold2);font-family:Georgia,"Times New Roman",serif;font-size:21px;margin-bottom:4px}.premium{margin-top:14px;border:1px solid rgba(255,233,166,.36);border-radius:18px;padding:15px;background:radial-gradient(circle at 50% 0,rgba(246,199,94,.22),rgba(2,5,10,.56));text-align:left}.premium b{font-family:Georgia,"Times New Roman",serif;color:var(--gold2);font-size:23px}.premium ul{padding-left:19px;margin:9px 0 0;color:var(--muted);line-height:1.45}
    .modal-backdrop{position:fixed;z-index:60;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px}.modal-backdrop.show{display:flex}.modal{width:min(420px,100%);border:1px solid rgba(246,199,94,.33);border-radius:24px;background:linear-gradient(180deg,#08101d,#03070d);box-shadow:0 30px 90px #000;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px}.modal h3{font-family:Georgia,"Times New Roman",serif;color:var(--gold);font-size:32px;margin:0}.close{width:42px;height:42px;border-radius:50%;border:1px solid rgba(246,199,94,.28);color:var(--gold2);font-size:23px}.field{margin-top:14px;text-align:left}.field label{display:block;color:var(--muted);margin-bottom:7px}.field input,.field select{width:100%;height:54px;border-radius:14px;border:1px solid rgba(246,199,94,.30);background:#050712;padding:0 14px;color:var(--ink);outline:0}.gold-action{width:100%;height:58px;border-radius:999px;margin-top:18px;background:linear-gradient(180deg,#fff0a9,#f6c75e 48%,#d89823);font-family:Georgia,"Times New Roman",serif;font-size:25px;font-weight:900;color:#130b02}.toast{position:fixed;z-index:80;left:50%;bottom:82px;transform:translateX(-50%) translateY(20px);opacity:0;background:#050913;color:var(--gold2);border:1px solid rgba(246,199,94,.32);border-radius:18px;padding:12px 18px;box-shadow:0 16px 50px #000;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @keyframes turn{to{transform:rotate(360deg)}}
    @media (max-height:760px){.portal-title{top:45px}.cosmos{top:47%;width:min(78vw,350px)}.portal-btn{bottom:137px;height:56px}.known{bottom:103px;font-size:19px}.portal-icons{bottom:18px}.picon{height:64px}.dash .hero{margin-top:42px}.astro-board{height:44dvh;min-height:315px}.energy{padding:12px 14px}.energy h3{font-size:29px;margin-bottom:6px}.meter{margin:5px 0}.cta{height:56px}.page-head{margin-top:42px}.card{margin-top:18px;padding:20px 16px}.daily-text{font-size:30px}}
  </style>
</head>
<body>
  <div class="app">
    <main class="phone" id="phone">
      <section id="portal" class="screen portal active" aria-label="Accueil Horoscope Galactic">
        <div class="frame"><div class="stars"></div><div class="portal-art"></div></div>
        <div class="portal-title"><div class="tiny">Horoscope</div><h1>Galactic</h1><p>Entrez dans votre univers astral</p></div>
        <div class="cosmos" aria-hidden="true"><div class="halo"></div><div class="zodiac-ring" id="portalRing"></div><div class="seal"><div><div class="seal-logo">✦</div><div class="seal-name">Portail</div></div></div></div>
        <button class="portal-btn" id="openSky">✦ Ouvrir mon ciel</button>
        <button class="known" id="knownSign">Je connais déjà mon signe</button>
        <div class="portal-icons">
          <button class="picon" data-open="daily"><b>☉</b>Horoscope<br>du jour</button>
          <button class="picon" data-open="theme"><b>◎</b>Thème<br>astral</button>
          <button class="picon" data-open="compat"><b>♡</b>Compatibilité</button>
          <button class="picon" data-open="numerology"><b>7</b>Numérologie</button>
          <button class="picon" data-open="crystals"><b>◇</b>Cristaux</button>
        </div>
      </section>

      <section id="dashboard" class="screen dash" aria-label="Ma galaxie">
        <div class="stars"></div>
        <header class="topline"><button class="round" id="backPortal" aria-label="Accueil">‹</button><div class="brand"><small>Horoscope</small><b>Galactic</b></div><button class="round" id="profileTop" aria-label="Profil">♕</button></header>
        <div class="hero"><h2>Bienvenue</h2><p>dans votre galaxie</p></div>
        <div class="astro-board">
          <div class="orbit"></div>
          <button class="mod mod-h" data-open="daily"><span class="circle">☉</span><span class="label">Horoscope<br>du jour</span></button>
          <button class="mod mod-c" data-open="compat"><span class="circle">♡</span><span class="label">Compatibilité</span></button>
          <button class="mod mod-t" data-open="theme"><span class="circle">◎</span><span class="label">Thème<br>astral</span></button>
          <button class="mod mod-n" data-open="numerology"><span class="circle">7</span><span class="label">Numérologie</span></button>
          <button class="mod mod-cr" data-open="crystals"><span class="circle">◇</span><span class="label">Cristaux</span></button>
          <div class="center-sign" id="centerSign"></div>
        </div>
        <section class="energy"><h3>Énergie du jour</h3><div id="meters"></div></section>
        <button class="cta" id="seeDaily">✦ Voir mon message du jour ›</button>
        <nav><button class="active" data-nav="dashboard"><b>☉</b>Ma galaxie</button><button data-nav="daily"><b>☾</b>Guidance</button><button data-nav="journal"><b>▤</b>Journal</button><button data-nav="favorites"><b>☆</b>Favoris</button><button data-nav="profile"><b>◎</b>Profil</button></nav>
      </section>

      <section id="daily" class="screen daily-screen" aria-label="Message des étoiles">
        <div class="stars"></div>
        <header class="topline"><button class="round" data-nav="dashboard" aria-label="Retour">‹</button><div class="brand"><small>Horoscope</small><b>Galactic</b></div><button class="round" id="shareDaily" aria-label="Partager">↗</button></header>
        <div class="page-head"><h2>Message des étoiles</h2><p>Votre rituel cosmique quotidien</p></div>
        <article class="card"><div class="big-seal" id="dailySeal">✦</div><div class="date" id="dailyDate"></div><p class="daily-text" id="dailyText"></p><p class="daily-sub" id="dailySub"></p></article>
        <div class="score-grid" id="dailyScores"></div>
        <div class="affinity" id="dailyAffinity"></div>
        <button class="backbtn" data-nav="dashboard">← Ma galaxie</button>
      </section>

      <section id="module" class="screen module-screen" aria-label="Module astral détaillé">
        <div class="stars"></div>
        <header class="topline"><button class="round" data-nav="dashboard" aria-label="Retour">‹</button><div class="brand"><small>Horoscope</small><b>Galactic</b></div><button class="round" data-nav="profile" aria-label="Profil">◎</button></header>
        <div class="page-head"><h2 id="moduleTitle">Guidance</h2><p id="moduleSubtitle">Votre espace astral</p></div>
        <article class="detail" id="moduleBody"></article>
        <button class="backbtn" data-nav="dashboard">← Ma galaxie</button>
      </section>

      <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal"><div class="modal-head"><h3 id="modalTitle">Votre profil astral</h3><button class="close" id="modalClose">×</button></div><div id="modalBody"></div></div>
      </div>
      <div id="toast" class="toast"></div>
    </main>
  </div>

  <script>
  (()=>{
    const GLYPHS=['♈︎','♉︎','♊︎','♋︎','♌︎','♍︎','♎︎','♏︎','♐︎','♑︎','♒︎','♓︎'];
    const signs=[
      {name:'Bélier',glyph:'♈︎',range:'21 mars - 19 avril',start:[3,21],end:[4,19],element:'Feu',stone:'Jaspe rouge',tone:'audace',aff:'Lion'},
      {name:'Taureau',glyph:'♉︎',range:'20 avril - 20 mai',start:[4,20],end:[5,20],element:'Terre',stone:'Quartz rose',tone:'stabilité',aff:'Poissons'},
      {name:'Gémeaux',glyph:'♊︎',range:'21 mai - 20 juin',start:[5,21],end:[6,20],element:'Air',stone:'Citrine',tone:'curiosité',aff:'Balance'},
      {name:'Cancer',glyph:'♋︎',range:'21 juin - 22 juillet',start:[6,21],end:[7,22],element:'Eau',stone:'Pierre de lune',tone:'intuition',aff:'Scorpion'},
      {name:'Lion',glyph:'♌︎',range:'23 juillet - 22 août',start:[7,23],end:[8,22],element:'Feu',stone:'Œil de tigre',tone:'rayonnement',aff:'Taureau'},
      {name:'Vierge',glyph:'♍︎',range:'23 août - 22 septembre',start:[8,23],end:[9,22],element:'Terre',stone:'Amazonite',tone:'clarté',aff:'Capricorne'},
      {name:'Balance',glyph:'♎︎',range:'23 septembre - 22 octobre',start:[9,23],end:[10,22],element:'Air',stone:'Lapis-lazuli',tone:'harmonie',aff:'Gémeaux'},
      {name:'Scorpion',glyph:'♏︎',range:'23 octobre - 21 novembre',start:[10,23],end:[11,21],element:'Eau',stone:'Obsidienne',tone:'transformation',aff:'Cancer'},
      {name:'Sagittaire',glyph:'♐︎',range:'22 novembre - 21 décembre',start:[11,22],end:[12,21],element:'Feu',stone:'Turquoise',tone:'élan',aff:'Verseau'},
      {name:'Capricorne',glyph:'♑︎',range:'22 décembre - 19 janvier',start:[12,22],end:[1,19],element:'Terre',stone:'Onyx',tone:'maîtrise',aff:'Vierge'},
      {name:'Verseau',glyph:'♒︎',range:'20 janvier - 18 février',start:[1,20],end:[2,18],element:'Air',stone:'Améthyste',tone:'vision',aff:'Sagittaire'},
      {name:'Poissons',glyph:'♓︎',range:'19 février - 20 mars',start:[2,19],end:[3,20],element:'Eau',stone:'Aigue-marine',tone:'sensibilité',aff:'Taureau'}
    ];
    const STORAGE='horoscope-galactic-profile-vfinal';
    const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
    let profile=JSON.parse(localStorage.getItem(STORAGE)||'null')||{sign:'Lion',birth:''};
    if(new URLSearchParams(location.search).get('reset')==='1'){localStorage.removeItem(STORAGE);profile={sign:'Lion',birth:''};}
    const sign=()=>signs.find(s=>s.name===profile.sign)||signs[4];
    const seed=()=>{const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()+sign().name.length*17};
    const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));
    function show(id){$$('.screen').forEach(s=>s.classList.remove('active'));$('#'+id).classList.add('active');setNav(id)}
    function setNav(id){$$('nav button').forEach(b=>b.classList.toggle('active',b.dataset.nav===id||id==='module'&&b.dataset.nav==='dashboard'))}
    function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
    function detectSign(dateStr){if(!dateStr)return null;const d=new Date(dateStr+'T12:00:00');const m=d.getMonth()+1, day=d.getDate();return signs.find(s=>{const [sm,sd]=s.start,[em,ed]=s.end;if(sm>em)return (m===sm&&day>=sd)||(m===em&&day<=ed)||m>sm||m<em;return (m===sm&&day>=sd)||(m===em&&day<=ed)||(m>sm&&m<em);});}
    function rotateItems(containerId,large=false){const el=$(containerId);el.innerHTML='';GLYPHS.forEach((g,i)=>{const z=document.createElement('div');z.className='zmini';z.innerHTML='<span>'+g+'</span>';const deg=i*30-90;const r=large?45:44;z.style.transform=`rotate(${deg}deg) translate(${r}%) rotate(${-deg}deg)`;el.appendChild(z);});}
    function values(){const x=seed()%31;return {Amour:clamp(72+x%18,55,96),Argent:clamp(58+(x*2)%28,50,92),Humeur:clamp(64+(x*3)%27,50,95),Énergie:clamp(66+(x*5)%25,48,96),Chance:clamp(62+(x*7)%30,48,96)}}
    function renderDashboard(){const s=sign();$('#centerSign').innerHTML=`<div><div class="glyph">${s.glyph}</div><div class="name">${s.name}</div><div class="range">${s.range}</div></div>`;const vals=values();$('#meters').innerHTML=[['♡','Amour',vals.Amour],['★','Chance',vals.Chance],['☺','Humeur',vals.Humeur],['⚡','Énergie',vals.Énergie]].map(v=>`<div class="meter"><span class="dot">${v[0]}</span><span>${v[1]}</span><span class="bar"><i style="width:${v[2]}%"></i></span><b>${v[2]} %</b></div>`).join('');}
    function localMessage(){const s=sign();const msgs=[`Cher ${s.name}, votre ciel met en lumière votre ${s.tone}. Avancez avec calme : une réponse simple peut ouvrir une porte plus grande que prévu.`,`Aujourd’hui, ${s.name}, l’univers vous invite à choisir la voie la plus claire. Votre énergie attire ce qui respecte votre rythme.`,`Votre signe ${s.name} reçoit une impulsion douce : écoutez les signes discrets, ils confirment une direction déjà présente en vous.`];return msgs[seed()%msgs.length];}
    async function openDaily(){show('daily');const s=sign(), vals=values();$('#dailySeal').textContent=s.glyph;$('#dailyDate').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});$('#dailyText').textContent=localMessage();$('#dailySub').textContent='Prenez ce message comme une guidance symbolique et personnelle pour poser votre intention du jour.';$('#dailyScores').innerHTML=[['♡','Amour',vals.Amour],['◎','Argent',vals.Argent],['☺','Humeur',vals.Humeur],['⚡','Énergie',vals.Énergie]].map(x=>`<div class="score"><span>${x[0]}</span><b>${x[2]}%</b><small>${x[1]}</small></div>`).join('');$('#dailyAffinity').innerHTML=`Affinité du jour : <strong>${s.aff}</strong><br><span style="font-family:Inter,system-ui;color:var(--muted);font-size:15px">Connexion simple et bienveillante.</span>`;try{const r=await fetch('/api/horoscope?sign='+encodeURIComponent(s.name));if(r.ok){const data=await r.json();if(data&&data.text)$('#dailyText').textContent=data.text;if(data&&data.detail)$('#dailySub').textContent=data.detail;}}catch(e){} }
    function moduleContent(type){const s=sign();const vals=values();const pathNum=profile.birth?((profile.birth.replaceAll('-','').split('').reduce((a,b)=>a+Number(b),0)-1)%9)+1:7;const map={
      theme:{title:'Thème astral',sub:'Votre architecture intérieure',html:`<h3>Thème astral</h3><p>Votre profil ${s.name} met l’accent sur l’élément <strong>${s.element}</strong>. L’objectif est de transformer cette énergie en décisions plus lisibles.</p><div class="mini-grid"><div class="mini-card"><strong>Soleil</strong>Identité, élan, vitalité.</div><div class="mini-card"><strong>Lune</strong>Émotions et sécurité intérieure.</div><div class="mini-card"><strong>Ascendant</strong>Image, posture, premier mouvement.</div><div class="mini-card"><strong>Maison clé</strong>Zone de vie à observer aujourd’hui.</div></div><div class="premium"><b>Galactic Premium</b><ul><li>Carte astrale complète avec heure et lieu de naissance.</li><li>Lecture des maisons, planètes et aspects principaux.</li><li>Résumé clair, sans langage compliqué.</li></ul></div>`},
      compat:{title:'Compatibilité',sub:'Analyse entre deux signes',html:`<h3>Compatibilité</h3><p>Votre affinité du jour avec <strong>${s.aff}</strong> favorise une connexion stable. Le score symbolique est de <strong>${vals.Amour}%</strong>.</p><div class="mini-grid"><div class="mini-card"><strong>Attirance</strong>Élan naturel et curiosité.</div><div class="mini-card"><strong>Dialogue</strong>Clarté émotionnelle.</div><div class="mini-card"><strong>Équilibre</strong>Respect du rythme de chacun.</div><div class="mini-card"><strong>Conseil</strong>Parler simple, agir juste.</div></div><div class="premium"><b>Galactic Premium</b><ul><li>Comparaison détaillée de deux profils.</li><li>Forces, tensions et conseils concrets.</li><li>Lecture amour, amitié ou collaboration.</li></ul></div>`},
      numerology:{title:'Numérologie',sub:'Nombre personnel et vibration',html:`<h3>Numérologie</h3><p>Votre vibration actuelle met en avant le nombre <strong>${pathNum}</strong>. Il représente le mouvement du jour, pas une vérité figée.</p><div class="mini-grid"><div class="mini-card"><strong>Chemin</strong>${pathNum}</div><div class="mini-card"><strong>Couleur</strong>Or solaire</div><div class="mini-card"><strong>Action</strong>Clarifier une priorité.</div><div class="mini-card"><strong>Rythme</strong>Avancer sans forcer.</div></div><div class="premium"><b>Galactic Premium</b><ul><li>Chemin de vie complet.</li><li>Année, mois et jour personnels.</li><li>Guidance numérologique détaillée.</li></ul></div>`},
      crystals:{title:'Cristaux',sub:'Pierre, intention, énergie',html:`<h3>Cristaux</h3><p>La pierre associée à votre signe aujourd’hui est <strong>${s.stone}</strong>. Elle sert de repère symbolique pour poser une intention calme.</p><div class="mini-grid"><div class="mini-card"><strong>Pierre</strong>${s.stone}</div><div class="mini-card"><strong>Intention</strong>${s.tone}</div><div class="mini-card"><strong>Rituel</strong>Respirer 3 fois avant d’agir.</div><div class="mini-card"><strong>Phrase</strong>“Je choisis ma direction.”</div></div><div class="premium"><b>Galactic Premium</b><ul><li>Pierre du jour selon signe et énergie.</li><li>Rituels simples et intentions guidées.</li><li>Favoris et journal personnel.</li></ul></div>`},
      journal:{title:'Journal',sub:'Votre carnet cosmique',html:`<h3>Journal</h3><p>Un espace personnel pour noter vos ressentis, vos signes du jour et les synchronicités importantes.</p><div class="premium"><b>Galactic Premium</b><ul><li>Journal privé quotidien.</li><li>Historique des messages.</li><li>Favoris et intentions sauvegardées.</li></ul></div>`},
      favorites:{title:'Favoris',sub:'Vos guidances gardées',html:`<h3>Favoris</h3><p>Retrouvez ici les messages, pierres et conseils que vous souhaitez garder pour plus tard.</p><div class="premium"><b>Galactic Premium</b><ul><li>Sauvegarde des guidances.</li><li>Collections par thème.</li><li>Retours rapides depuis le tableau de bord.</li></ul></div>`}
    };return map[type]||map.theme;}
    function openModule(type){const m=moduleContent(type);$('#moduleTitle').textContent=m.title;$('#moduleSubtitle').textContent=m.sub;$('#moduleBody').innerHTML=m.html;show('module')}
    function openProfile(){const options=signs.map(s=>`<option value="${s.name}" ${s.name===profile.sign?'selected':''}>${s.name}</option>`).join('');$('#modalTitle').textContent='Votre profil astral';$('#modalBody').innerHTML=`<div class="field"><label>Date de naissance</label><input id="birthDate" type="date" value="${profile.birth||''}"></div><div class="field"><label>Ou choisissez votre signe</label><select id="signSelect">${options}</select></div><button class="gold-action" id="saveProfile">Ouvrir ma galaxie</button>`;$('#modalBackdrop').classList.add('show');$('#saveProfile').onclick=()=>{const birth=$('#birthDate').value;const detected=detectSign(birth);profile={birth,sign:(detected?detected.name:$('#signSelect').value)};localStorage.setItem(STORAGE,JSON.stringify(profile));$('#modalBackdrop').classList.remove('show');renderDashboard();show('dashboard')};}
    function boot(){rotateItems('#portalRing');renderDashboard();$$('[data-open]').forEach(b=>b.addEventListener('click',()=>{const t=b.dataset.open;if(t==='daily'){profile.sign=profile.sign||'Lion';renderDashboard();openDaily();}else openModule(t)}));$$('[data-nav]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.nav;if(n==='dashboard'){renderDashboard();show('dashboard')}else if(n==='daily')openDaily();else if(n==='profile')openProfile();else openModule(n)}));$('#openSky').onclick=openProfile;$('#knownSign').onclick=openProfile;$('#profileTop').onclick=openProfile;$('#backPortal').onclick=()=>show('portal');$('#seeDaily').onclick=openDaily;$('#modalClose').onclick=()=>$('#modalBackdrop').classList.remove('show');$('#modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')$('#modalBackdrop').classList.remove('show')});$('#shareDaily').onclick=async()=>{const text='Mon message du jour sur Horoscope Galactic';try{await navigator.share({title:'Horoscope Galactic',text,url:location.origin});}catch(e){toast('Lien prêt à partager')}};if(new URLSearchParams(location.search).get('dashboard')==='1'){show('dashboard')}else show('portal');if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}}
    boot();
  })();
  </script>
</body>
</html>
